<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrasi Vendor - Inventory</title>
    <link rel="icon" href="favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f5f6fa 0%, #e8ecf1 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }
      .auth-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .auth-header {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: white;
        padding: 25px 30px;
        text-align: center;
      }
      .auth-header h4 {
        margin-bottom: 4px;
        font-weight: 700;
      }
      .auth-body {
        padding: 30px;
      }
      .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.2);
      }
      .btn-auth {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        border: none;
        padding: 10px;
        font-weight: 600;
      }
      .btn-auth:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
      }
      .input-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        z-index: 10;
      }
      .input-icon-textarea {
        position: absolute;
        left: 12px;
        top: 16px;
        color: #adb5bd;
        z-index: 10;
      }
      .form-group {
        position: relative;
      }
      .form-group .form-control {
        padding-left: 38px;
        padding-right: 38px;
      }
      .password-toggle {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #adb5bd;
        cursor: pointer;
        z-index: 10;
        padding: 4px 8px;
      }
      .password-toggle:hover {
        color: #495057;
      }
      .toast-container-custom {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="auth-card">
            <div class="auth-header">
              <i class="fas fa-boxes fa-2x mb-2"></i>
              <h4><i class="fas fa-user-plus me-2"></i>Registrasi Vendor</h4>
              <small class="opacity-75"
                >Daftar untuk mengakses data inventory</small
              >
            </div>
            <div class="auth-body">
              <form id="registerForm">
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >Email <span class="text-danger">*</span></label
                  >
                  <div class="form-group">
                    <i class="fas fa-envelope input-icon"></i>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      placeholder="vendor@example.com"
                      required
                    />
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >Password <span class="text-danger">*</span></label
                  >
                  <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      placeholder="Minimal 6 karakter"
                      required
                      minlength="6"
                    />
                    <button
                      type="button"
                      class="password-toggle"
                      data-target="password"
                    >
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >Konfirmasi Password
                    <span class="text-danger">*</span></label
                  >
                  <div class="form-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input
                      type="password"
                      class="form-control"
                      id="confirm_password"
                      required
                    />
                    <button
                      type="button"
                      class="password-toggle"
                      data-target="confirm_password"
                    >
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >Nama Perusahaan</label
                  >
                  <div class="form-group">
                    <i class="fas fa-building input-icon"></i>
                    <input
                      type="text"
                      class="form-control"
                      id="nama_perusahaan"
                    />
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >No. Telepon</label
                  >
                  <div class="form-group">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="text" class="form-control" id="no_telp" />
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label small fw-bold text-muted"
                    >Alamat</label
                  >
                  <div class="form-group">
                    <i class="fas fa-map-marker-alt input-icon-textarea"></i>
                    <textarea
                      class="form-control"
                      id="alamat"
                      rows="2"
                      style="padding-left: 38px"
                    ></textarea>
                  </div>
                </div>
                <div class="mb-4">
                  <label class="form-label small fw-bold text-muted"
                    >Nama Pemilik</label
                  >
                  <div class="form-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" class="form-control" id="pic_name" />
                  </div>
                </div>
                <button
                  type="submit"
                  class="btn btn-primary btn-auth w-100"
                  id="btnRegister"
                >
                  <i class="fas fa-user-plus me-2"></i>Daftar
                </button>
              </form>
              <div class="text-center mt-3">
                <small class="text-muted">
                  Sudah punya akun?
                  <a href="login.html" class="text-primary fw-bold"
                    >Login di sini</a
                  >
                </small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container-custom" id="toastContainer">
      <div
        id="liveToast"
        class="toast align-items-center border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastBody"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
        var API_BASE =
          window.location.hostname === 'localhost'
            ? 'http://localhost/inventory/public'
            : 'https://inventory.pms.web.id';
        var API_URL = API_BASE + '/ApiSync';

        if (localStorage.getItem('vendor_token')) {
          window.location.href = 'index.html';
        }

        // Toggle password visibility
        $('.password-toggle').on('click', function () {
          var input = $('#' + $(this).data('target'));
          var icon = $(this).find('i');
          if (input.attr('type') === 'password') {
            input.attr('type', 'text');
            icon.removeClass('fa-eye').addClass('fa-eye-slash');
          } else {
            input.attr('type', 'password');
            icon.removeClass('fa-eye-slash').addClass('fa-eye');
          }
        });

        function showAlert(type, msg) {
          var icon =
            type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
          var bgClass = type === 'success' ? 'bg-success' : 'bg-danger';
          $('#liveToast').removeClass('bg-success bg-danger').addClass(bgClass);
          $('#toastBody').html(
            '<i class="fas ' +
              icon +
              ' me-2 text-white"></i><span class="text-white">' +
              msg +
              '</span>',
          );
          var toast = new bootstrap.Toast($('#liveToast')[0], { delay: 4000 });
          toast.show();
        }

        $('#registerForm').on('submit', function (e) {
          e.preventDefault();
          var email = $('#email').val().trim();
          var password = $('#password').val();
          var confirmPassword = $('#confirm_password').val();

          if (!email || !password) {
            showAlert('danger', 'Email dan password wajib diisi');
            return;
          }
          if (password.length < 6) {
            showAlert('danger', 'Password minimal 6 karakter');
            return;
          }
          if (password !== confirmPassword) {
            showAlert('danger', 'Password dan konfirmasi password tidak cocok');
            return;
          }

          $('#btnRegister')
            .prop('disabled', true)
            .html('<i class="fas fa-spinner fa-spin me-2"></i>Mendaftar...');

          $.ajax({
            url: API_URL + '/vendorRegister',
            method: 'POST',
            contentType: 'application/json',
            dataType: 'json',
            data: JSON.stringify({
              email: email,
              password: password,
              nama_perusahaan: $('#nama_perusahaan').val().trim(),
              no_telp: $('#no_telp').val().trim(),
              alamat: $('#alamat').val().trim(),
              pic_name: $('#pic_name').val().trim(),
            }),
            success: function (resp) {
              if (resp.success) {
                showAlert('success', 'Registrasi berhasil! Silakan login.');
                setTimeout(function () {
                  window.location.href = 'login.html';
                }, 1500);
              } else {
                showAlert('danger', resp.message || 'Registrasi gagal');
                $('#btnRegister')
                  .prop('disabled', false)
                  .html('<i class="fas fa-user-plus me-2"></i>Daftar');
              }
            },
            error: function () {
              showAlert('danger', 'Gagal terhubung ke server.');
              $('#btnRegister')
                .prop('disabled', false)
                .html('<i class="fas fa-user-plus me-2"></i>Daftar');
            },
          });
        });
      });
    </script>
  </body>
</html>
